name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $semver = $tag.TrimStart('v')
          "semver=$semver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore
        run: dotnet restore src/UniversalSpellCheck.csproj

      - name: Publish
        shell: pwsh
        run: |
          dotnet publish src/UniversalSpellCheck.csproj `
            -c Release -r win-x64 --self-contained false `
            /p:Version=${{ steps.ver.outputs.semver }} `
            /p:AssemblyVersion=${{ steps.ver.outputs.semver }}.0 `
            /p:FileVersion=${{ steps.ver.outputs.semver }}.0 `
            -o publish

      - name: Startup smoke test
        shell: pwsh
        run: |
          # Launch the published app in --startup-smoke mode: it constructs the
          # real tray app context (the path that crashed in 0.7.0) and self-exits.
          # A GUI-subsystem exe does not block PowerShell, so wait explicitly and
          # read the real exit code. Non-zero or a hang aborts the release before
          # anything is packed or uploaded.
          $p = Start-Process -FilePath "publish/UniversalSpellCheck.exe" `
            -ArgumentList "--startup-smoke" -PassThru
          try {
            $p | Wait-Process -Timeout 60 -ErrorAction Stop
          } catch {
            Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
            Write-Error "Startup smoke timed out (>60s) — app hung on launch. Aborting release."
            exit 1
          }
          if ($p.ExitCode -ne 0) {
            Write-Error "Startup smoke failed (exit $($p.ExitCode)) — app crashes on construction. Aborting release."
            exit 1
          }
          Write-Host "Startup smoke passed (exit 0)."

      - name: Install vpk
        run: dotnet tool install --global vpk

      - name: Pack
        shell: pwsh
        run: |
          vpk pack `
            --packId UniversalSpellCheck `
            --packVersion ${{ steps.ver.outputs.semver }} `
            --packDir publish `
            --mainExe UniversalSpellCheck.exe `
            --packTitle "Universal Spell Check"

      - name: Upload to GitHub Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          vpk upload github `
            --repoUrl ${{ github.server_url }}/${{ github.repository }} `
            --token $env:GITHUB_TOKEN `
            --tag ${{ github.ref_name }} `
            --releaseName "Universal Spell Check ${{ github.ref_name }}" `
            --publish
